{% extends "studio/base.html" %}

{% block content %}
<style>
    /* Professional Gallery Header */
    .gallery-title {
        font-size: 2.5rem;
        border-left: 4px solid var(--accent-gold);
        padding-left: 15px;
        margin-bottom: 30px;
    }

    /* Modern Masonry-style Grid */
    .ink-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        grid-gap: 20px;
        grid-auto-flow: dense;
    }

    /* Tattoo Card Styling */
    .tattoo-item {
        position: relative;
        overflow: hidden;
        border-radius: 8px;
        background: #1a1a1a;
        aspect-ratio: 1 / 1; /* Keeps images uniform, or remove for masonry */
    }

    .tattoo-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* Elegant Glass Hover Overlay */
    .tattoo-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
        padding: 20px;
        opacity: 0;
        transition: opacity 0.3s ease;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
    }

    .tattoo-item:hover img {
        transform: scale(1.1);
    }

    .tattoo-item:hover .tattoo-overlay {
        opacity: 1;
    }

    .tattoo-info h5 {
        font-family: 'Cinzel', serif;
        color: var(--accent-gold);
        margin: 0;
        font-size: 1.1rem;
    }

    .tattoo-info p {
        color: #ddd;
        font-size: 0.85rem;
        margin: 5px 0 0;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    /* Search Bar Professionalism */
    .gallery-filter {
        background: #161616;
        border: 1px solid #333;
        color: white;
        padding: 12px 20px;
        border-radius: 50px;
        width: 100%;
        max-width: 500px;
        margin-bottom: 40px;
    }
</style>

<div class="container py-5">
    <div class="d-md-flex justify-content-between align-items-center mb-5">
        <h2 class="gallery-title">The <span class="text-gold">Portfolio</span></h2>
        <input type="text" class="gallery-filter" placeholder="Search by style (e.g. Realism, Fineline)...">
    </div>

    <div class="ink-grid">
        {% for tattoo in tattoos %}
        <div class="tattoo-item shadow-lg">
            <!-- Ensure your model handles the image URL correctly -->
            <img src="{{ tattoo.image.url }}" alt="{{ tattoo.title }}" loading="lazy">
            
            <div class="tattoo-overlay">
                <div class="tattoo-info">
                    <h5>{{ tattoo.title }}</h5>
                    <p>By {{ tattoo.artist.name }}</p>
                </div>
            </div>
        </div>
        {% empty %}
        <!-- Professional Placeholder if no tattoos exist yet -->
        <div class="col-12 text-center py-5">
            <p class="text-muted italic">Our needles are currently busy. Check back soon for new art.</p>
        </div>
        {% endfor %}
    </div>
</div>

<!-- Lightbox Trigger Script (Optional: Requires a library like GLightbox or Magnific Popup) -->
<script>
    // You can add a click-to-enlarge function here later
</script>

{% endblock %}
