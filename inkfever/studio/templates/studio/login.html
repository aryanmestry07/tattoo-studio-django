{% extends "studio/base.html" %}

{% block title %}Client Access | Ink Fever{% endblock %}

{% block content %}
<style>
    :root {
        --gold: #bc9c22;
        --dark-bg: #080808;
        --border-color: #1a1a1a;
    }

    .auth-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }

    .auth-card {
        width: 100%;
        max-width: 400px;
        background: #0f0f0f;
        border: 1px solid var(--border-color);
        padding: 50px 40px;
        position: relative;
        animation: fadeIn 0.8s ease-out;
    }

    /* Architectural Accent Line */
    .auth-card::before {
        content: "";
        position: absolute;
        top: -1px;
        left: 20px;
        right: 20px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .auth-header {
        text-align: center;
        margin-bottom: 40px;
    }

    .auth-header h2 {
        font-family: 'Cinzel', serif;
        font-size: 1.8rem;
        letter-spacing: 5px;
        color: #fff;
        margin-bottom: 10px;
        text-transform: uppercase;
    }

    .label-accent {
        font-size: 0.65rem;
        letter-spacing: 3px;
        color: var(--gold);
        text-transform: uppercase;
        display: block;
        margin-bottom: 25px;
    }

    /* Input Styling */
    .form-group {
        margin-bottom: 25px;
    }

    .form-group label {
        display: block;
        color: #ffffff; /* High-visibility white */
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 10px;
    }

    .form-control-custom {
        width: 100%;
        background: transparent;
        border: 1px solid var(--border-color);
        color: #fff;
        padding: 12px 15px;
        font-size: 0.9rem;
        border-radius: 0;
        transition: all 0.3s ease;
    }

    .form-control-custom:focus {
        outline: none;
        border-color: var(--gold);
        background: rgba(255, 255, 255, 0.02);
    }

    /* --- THE SIGNATURE GOLD BUTTON --- */
    .btn-login {
        width: 100%;
        background: var(--gold);
        color: #000;
        border: none;
        padding: 15px;
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 3px;
        font-size: 0.8rem;
        margin-top: 20px;
        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        cursor: pointer;
    }

    .btn-login:hover {
        background: #fff;
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(188, 156, 34, 0.2);
    }

    .auth-footer {
        text-align: center;
        margin-top: 30px;
        font-size: 0.75rem;
        color: #666;
    }

    .auth-footer a {
        color: #fff;
        text-decoration: none;
        border-bottom: 1px solid var(--gold);
        padding-bottom: 2px;
        transition: opacity 0.3s;
    }

    .auth-footer a:hover {
        opacity: 0.7;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="label-accent">Authentication</span>
            <h2>Welcome Back</h2>
            <p class="small text-muted" style="letter-spacing: 1px;">Access your private gallery and bookings.</p>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control-custom" placeholder="ID / Username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control-custom" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Authorize Entry</button>
        </form>

        <div class="auth-footer">
            First time at the studio? <a href="{% url 'signup' %}">Create Account</a>
        </div>
    </div>
</div>
{% endblock %}
