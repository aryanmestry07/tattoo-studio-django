<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access | Ink Fever</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --admin-red: #ff3131;
            --bg-deep: #000;
            --card-bg: #0f0f0f;
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
        }

        body {
            background: radial-gradient(circle at top, #111 0%, #000 100%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid #222;
            padding: 50px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            position: relative;
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        /* Accent top bar */
        .login-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #ff3131, #ff6a6a);
        }

        .admin-header {
            font-family: 'Cinzel', serif;
            letter-spacing: 3px;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 10px;
        }

        .security-sub {
            font-size: 0.75rem;
            text-align: center;
            color: var(--admin-red);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            margin-bottom: 35px;
        }

        label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-sub);
            margin-bottom: 6px;
        }

        .form-control {
            background: #111 !important;
            border: 1px solid #333 !important;
            border-radius: 6px;
            color: #fff !important;
            padding: 14px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .form-control::placeholder {
            color: #666;
        }

        .form-control:focus {
            border-color: var(--admin-red) !important;
            box-shadow: 0 0 8px rgba(255, 49, 49, 0.3);
        }

        .btn-admin {
            background: var(--admin-red);
            border: none;
            color: white;
            padding: 14px;
            border-radius: 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s ease;
        }

        .btn-admin:hover {
            background: white;
            color: black;
            transform: scale(1.02);
        }

        .alert-error {
            background: rgba(255, 49, 49, 0.15);
            border: 1px solid #ff3131;
            color: #ff6a6a;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 20px;
        }

        .back-link {
            color: var(--text-sub);
            font-size: 0.8rem;
            display: block;
            text-align: center;
            margin-top: 25px;
            text-decoration: none;
        }

        .back-link:hover {
            color: white;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="admin-header">INK FEVER</div>
    <div class="security-sub">Admin Access</div>

    {% if error %}
    <div class="alert-error">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>

        <button type="submit" class="btn btn-admin w-100 mt-3">
            Login
        </button>
    </form>

    <a href="{% url 'home' %}" class="back-link">
        ← Back to website
    </a>

</div>

</body>
</html>
